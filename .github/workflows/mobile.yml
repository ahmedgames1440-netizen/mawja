name: Build Mawja (Android + iOS)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths: ["mobile/**", ".github/workflows/mobile.yml"]

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: mawja-android-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

  ios:
    runs-on: macos-14
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # Unsigned build — produces Runner.app you can sideload via Xcode / AltStore / Sideloadly
      - run: flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r mawja-unsigned.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: mawja-ios-ipa
          path: mobile/mawja-unsigned.ipa
